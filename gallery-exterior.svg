<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyEx" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a9c9d8"/>
      <stop offset="100%" stop-color="#eef4ee"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#skyEx)"/>
  <rect x="0" y="250" width="400" height="50" fill="#cdd7c8"/>

  <!-- building -->
  <rect x="90" y="80" width="220" height="170" fill="#f3efe6"/>
  <rect x="90" y="64" width="220" height="20" fill="#16263e"/>
  <rect x="60" y="140" width="40" height="110" fill="#e6e0d2"/>
  <rect x="300" y="140" width="40" height="110" fill="#e6e0d2"/>

  <!-- windows -->
  <g fill="#7fa6c2" stroke="#16263e" stroke-width="2">
    <rect x="108" y="100" width="26" height="30"/>
    <rect x="150" y="100" width="26" height="30"/>
    <rect x="224" y="100" width="26" height="30"/>
    <rect x="266" y="100" width="26" height="30"/>
    <rect x="108" y="150" width="26" height="30"/>
    <rect x="150" y="150" width="26" height="30"/>
    <rect x="224" y="150" width="26" height="30"/>
    <rect x="266" y="150" width="26" height="30"/>
    <rect x="108" y="200" width="26" height="30"/>
    <rect x="266" y="200" width="26" height="30"/>
  </g>

  <!-- entrance -->
  <rect x="170" y="190" width="60" height="60" fill="#16263e"/>
  <rect x="150" y="178" width="100" height="14" fill="#c9a056"/>
  <line x1="160" y1="178" x2="150" y2="190" stroke="#c9a056" stroke-width="4"/>
  <line x1="240" y1="178" x2="250" y2="190" stroke="#c9a056" stroke-width="4"/>

  <!-- flag -->
  <line x1="200" y1="64" x2="200" y2="30" stroke="#16263e" stroke-width="3"/>
  <path d="M200,32 L236,40 L200,48 Z" fill="#c9a056"/>

  <!-- driveway + topiary -->
  <ellipse cx="200" cy="262" rx="160" ry="14" fill="#d9c9a6" opacity="0.7"/>
  <circle cx="120" cy="245" r="14" fill="#3c6e6b"/>
  <rect x="116" y="255" width="8" height="14" fill="#5a4632"/>
  <circle cx="280" cy="245" r="14" fill="#3c6e6b"/>
  <rect x="276" y="255" width="8" height="14" fill="#5a4632"/>
</svg>
