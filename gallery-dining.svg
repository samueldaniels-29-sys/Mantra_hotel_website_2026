<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wallDin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b2018"/>
      <stop offset="100%" stop-color="#1a130d"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#wallDin)"/>
  <rect x="0" y="230" width="400" height="70" fill="#231a13"/>

  <!-- hanging lights -->
  <g stroke="#c9a056" stroke-width="2">
    <line x1="100" y1="0" x2="100" y2="60"/>
    <line x1="200" y1="0" x2="200" y2="45"/>
    <line x1="300" y1="0" x2="300" y2="60"/>
  </g>
  <circle cx="100" cy="68" r="12" fill="#e3c98f"/>
  <circle cx="200" cy="53" r="10" fill="#e3c98f"/>
  <circle cx="300" cy="68" r="12" fill="#e3c98f"/>
  <circle cx="100" cy="68" r="22" fill="#e3c98f" opacity="0.18"/>
  <circle cx="300" cy="68" r="22" fill="#e3c98f" opacity="0.18"/>

  <!-- table -->
  <ellipse cx="200" cy="220" rx="140" ry="22" fill="#3a2a1c"/>
  <rect x="150" y="220" width="100" height="10" fill="#1a130d"/>
  <ellipse cx="200" cy="205" rx="120" ry="18" fill="#f3ead8"/>

  <!-- plates and glasses -->
  <circle cx="150" cy="206" r="16" fill="#fff" opacity="0.92"/>
  <circle cx="250" cy="206" r="16" fill="#fff" opacity="0.92"/>
  <rect x="170" y="188" width="6" height="20" fill="#c9a056"/>
  <rect x="224" y="188" width="6" height="20" fill="#c9a056"/>
  <path d="M196,180 Q200,200 204,180" fill="none" stroke="#c9a056" stroke-width="2"/>

  <!-- candle -->
  <rect x="197" y="195" width="6" height="16" fill="#e3c98f"/>
  <circle cx="200" cy="192" r="4" fill="#ffb95e"/>
</svg>
