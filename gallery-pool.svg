<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bcdff0"/>
      <stop offset="100%" stop-color="#e9f3f7"/>
    </linearGradient>
    <linearGradient id="poolWater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fa9c9"/>
      <stop offset="100%" stop-color="#1a6b85"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#skyP)"/>
  <rect x="0" y="0" width="400" height="120" fill="url(#skyP)"/>

  <!-- loungers backdrop -->
  <rect x="20" y="90" width="70" height="14" rx="6" fill="#16263e"/>
  <rect x="30" y="78" width="50" height="14" rx="6" fill="#16263e"/>
  <rect x="310" y="90" width="70" height="14" rx="6" fill="#16263e"/>
  <rect x="320" y="78" width="50" height="14" rx="6" fill="#16263e"/>

  <!-- palm -->
  <rect x="350" y="60" width="8" height="60" fill="#16263e"/>
  <path d="M354,60 Q330,40 305,46 Q330,54 356,68" fill="#3c6e6b"/>
  <path d="M354,60 Q378,38 400,42 Q380,52 356,68" fill="#3c6e6b"/>

  <!-- pool -->
  <rect x="20" y="120" width="360" height="160" rx="18" fill="url(#poolWater)"/>
  <rect x="20" y="120" width="360" height="160" rx="18" fill="none" stroke="#e3c98f" stroke-width="6"/>
  <g stroke="#eaf7fb" stroke-width="3" opacity="0.45" fill="none">
    <path d="M50,160 Q80,150 110,160 T170,160"/>
    <path d="M200,200 Q230,190 260,200 T320,200"/>
    <path d="M60,230 Q90,220 120,230 T180,230"/>
    <path d="M240,150 Q270,140 300,150 T360,150"/>
  </g>

  <!-- floating ring -->
  <circle cx="290" cy="220" r="26" fill="none" stroke="#c9a056" stroke-width="10"/>
  <circle cx="290" cy="220" r="26" fill="none" stroke="#fff" stroke-width="3" stroke-dasharray="8 8"/>
</svg>
