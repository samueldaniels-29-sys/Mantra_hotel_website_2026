  <line x1="200" y1="20" x2="200" y2="42" stroke="#c9a056" stroke-width="2"/>
  <circle cx="186" cy="58" r="4" fill="#e3c98f" opacity="0.8"/>
  <circle cx="214" cy="58" r="4" fill="#e3c98f" opacity="0.8"/>

  <!-- bed, opulent -->
  <rect x="70" y="195" width="260" height="22" fill="#0a1626"/>
  <rect x="70" y="170" width="260" height="28" fill="#f3ead8"/>
  <rect x="70" y="217" width="260" height="55" fill="#c9a056"/>
  <rect x="84" y="132" width="80" height="44" rx="6" fill="#f3ead8"/>
