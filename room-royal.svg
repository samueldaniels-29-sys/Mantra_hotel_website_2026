  <path d="M58,118 Q200,90 342,118" fill="none" stroke="#c9a056" stroke-width="4"/>
  <path d="M70,118 Q120,150 70,200" fill="none" stroke="#c9a056" stroke-width="2" opacity="0.6"/>
  <path d="M330,118 Q280,150 330,200" fill="none" stroke="#c9a056" stroke-width="2" opacity="0.6"/>

