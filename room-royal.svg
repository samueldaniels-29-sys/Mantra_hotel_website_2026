<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wallR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16263e"/>
