  <rect x="26" y="138" width="200" height="24" fill="#f7f4ec"/>
  <rect x="26" y="182" width="200" height="55" fill="#0e1c30"/>
  <rect x="34" y="104" width="64" height="38" rx="6" fill="#fff"/>
  <rect x="102" y="104" width="64" height="38" rx="6" fill="#fff"/>
  <rect x="26" y="138" width="200" height="10" fill="#c9a056"/>
