  <line x1="240" y1="100" x2="380" y2="100" stroke="#16263e" stroke-width="4"/>
  <path d="M250,150 Q280,120 310,150 T370,150" fill="none" stroke="#0f3d4a" stroke-width="3" opacity="0.5"/>

